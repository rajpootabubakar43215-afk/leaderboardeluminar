openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ELUMINAR Leaderboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leaderboard
    description: Player leaderboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get the player leaderboard
      description: Returns paginated, sorted player stats from the CoD 1.1 server.
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum:
              - kills
              - deaths
              - headshots
              - bash
              - timePlayed
              - longestDist
              - shots
              - hits
              - dmg
              - suicides
              - kd
              - accuracy
              - name
            default: kills
        - name: sortDir
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: A page of leaderboard entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PlayerEntry:
      type: object
      properties:
        rank:
          type: integer
        id:
          type: string
        name:
          type: string
        kills:
          type: integer
        deaths:
          type: integer
        headshots:
          type: integer
        bash:
          type: integer
        timePlayed:
          type: integer
          description: Time played in seconds
        longestDist:
          type: number
        shots:
          type: integer
        hits:
          type: integer
        dmg:
          type: integer
        suicides:
          type: integer
        kd:
          type: number
        accuracy:
          type: number
          description: Accuracy as a percentage 0-100
      required:
        - rank
        - id
        - name
        - kills
        - deaths
        - headshots
        - bash
        - timePlayed
        - longestDist
        - shots
        - hits
        - dmg
        - suicides
        - kd
        - accuracy
    LeaderboardResponse:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalPlayers:
          type: integer
        totalPages:
          type: integer
        onlinePlayers:
          type: integer
          description: Currently connected players (best-effort, may be 0 if RCON unavailable)
        serverTime:
          type: string
          description: Server time formatted HH:MM:SS
        sortBy:
          type: string
        sortDir:
          type: string
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerEntry"
      required:
        - page
        - pageSize
        - totalPlayers
        - totalPages
        - onlinePlayers
        - serverTime
        - sortBy
        - sortDir
        - players
